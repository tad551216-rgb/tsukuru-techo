<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#e7e1d3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="つくる手帖ピンボール">
<title>つくる手帖ピンボール</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<style>
  :root{
    --paper:#fcfbf7;        /* 方眼ノートの紙 */
    --grid:#d7e2df;         /* 青緑の方眼罫 */
    --ink:#1f3a5f;          /* 万年筆のインク（藍） */
    --ink-soft:#5b7b7a;     /* 補助の墨 */
    --aka:#e8654a;          /* 朱（差し色） */
    --aka-deep:#c8472f;
    --pencil:#9aa3a0;       /* 鉛筆のグレー */
    --desk:#2b2a26;         /* 机 */
    --desk2:#211f1c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    position:fixed;inset:0;
    height:100vh;height:100svh;height:100dvh;
    background:
      radial-gradient(120% 80% at 50% -10%, #36342e 0%, var(--desk) 45%, var(--desk2) 100%);
    color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:8px 10px calc(6px + env(safe-area-inset-bottom));
    overscroll-behavior:none;touch-action:none;
    user-select:none;-webkit-user-select:none;
  }
  .page{
    width:100%;max-width:460px;
    flex:1 1 auto;min-height:0;
    display:flex;flex-direction:column;
    background:var(--paper);
    /* 方眼 */
    background-image:
      linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:22px 22px;
    border-radius:10px;
    box-shadow:0 18px 40px rgba(0,0,0,.45), 0 2px 0 rgba(0,0,0,.2);
    position:relative;
    padding:0 0 12px;
    overflow:hidden;
  }
  /* 左の朱の綴じ罫 */
  .page::before{
    content:"";position:absolute;top:0;bottom:0;left:30px;width:2px;
    background:rgba(232,101,74,.55);
  }
  .head{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:10px;padding:14px 16px 8px 44px;
    border-bottom:1.5px solid var(--ink);
  }
  .head__title{line-height:1.1}
  .eyebrow{
    font-size:12px;letter-spacing:.28em;color:var(--ink-soft);
    margin:0 0 3px;
  }
  .title{
    font-size:24px;font-weight:700;margin:0;color:var(--ink);
    letter-spacing:.04em;
  }
  .title small{font-size:13px;font-weight:400;color:var(--pencil);letter-spacing:.1em}
  .score{
    text-align:right;font-family:"Courier New",ui-monospace,monospace;
    color:var(--ink);white-space:nowrap;
  }
  .score__val{font-size:26px;font-weight:700;letter-spacing:.02em}
  .score__hi{font-size:11px;color:var(--ink-soft);margin-top:2px}
  .status{
    display:flex;align-items:center;justify-content:space-between;
    gap:8px;padding:8px 16px 6px 44px;font-size:13px;color:var(--ink-soft);
  }
  .balls{letter-spacing:3px;font-size:15px;color:var(--ink)}
  .steps{display:flex;gap:6px}
  .chip{
    width:24px;height:24px;border-radius:50%;
    border:1.5px solid var(--aka);color:var(--aka-deep);
    display:grid;place-items:center;font-size:13px;font-weight:700;
    transition:background .2s,color .2s,transform .2s;
  }
  .chip.on{background:var(--aka);color:#fff;transform:rotate(-6deg) scale(1.05)}
  .stage{
    flex:1 1 auto;min-height:0;
    display:flex;align-items:center;justify-content:center;
    margin:6px 12px 0;touch-action:none;
  }
  .board{
    position:relative;height:100%;width:auto;
    border-radius:6px;overflow:hidden;
  }
  canvas{display:block;width:100%;height:100%;border-radius:6px}
  /* 朱印（はんこ）スタンプ */
  .hanko{
    position:absolute;left:50%;top:42%;transform:translate(-50%,-50%) rotate(-12deg) scale(.4);
    width:120px;height:120px;border-radius:50%;
    border:4px solid var(--aka-deep);color:var(--aka-deep);
    display:grid;place-items:center;text-align:center;line-height:1.15;
    font-weight:800;font-size:26px;background:rgba(252,251,247,.35);
    opacity:0;pointer-events:none;
  }
  .hanko.pop{animation:stamp 1.2s ease-out forwards}
  @keyframes stamp{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(.4)}
    18%{opacity:1;transform:translate(-50%,-50%) rotate(-12deg) scale(1.08)}
    30%{transform:translate(-50%,-50%) rotate(-12deg) scale(1)}
    80%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(1)}
  }
  /* 中央のオーバーレイ（開始・ゲームオーバー） */
  .overlay{
    position:absolute;inset:0;display:flex;
    background:rgba(252,251,247,.86);text-align:center;
    padding:14px;overflow:auto;-webkit-overflow-scrolling:touch;
    touch-action:manipulation;
  }
  .overlay > div{margin:auto;width:100%}
  .overlay h2{margin:0 0 5px;font-size:19px;color:var(--ink);line-height:1.2}
  .ovimg{display:block;width:128px;max-width:42%;height:auto;max-height:24vh;margin:0 auto 8px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.12))}
  .overlay p{margin:0 0 14px;font-size:12.5px;color:var(--ink-soft);line-height:1.55}
  .btn{
    -webkit-appearance:none;appearance:none;cursor:pointer;
    font-family:inherit;font-size:16px;font-weight:700;letter-spacing:.08em;
    color:var(--paper);background:var(--ink);border:none;
    padding:11px 26px;border-radius:8px;
    box-shadow:0 3px 0 #14263e;
  }
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 #14263e}
  .controls{
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:10px 16px 0 44px;
  }
  .hint{font-size:11.5px;color:var(--pencil);line-height:1.6}
  .launch{
    -webkit-appearance:none;appearance:none;cursor:pointer;font-family:inherit;
    font-size:14px;font-weight:700;letter-spacing:.1em;color:var(--aka-deep);
    background:transparent;border:1.5px solid var(--aka);border-radius:8px;
    padding:9px 16px;white-space:nowrap;
  }
  .launch:active{background:var(--aka);color:#fff}
  .launch:disabled{opacity:.3}
  .foot{
    color:#b9b3a4;font-size:11px;margin-top:6px;flex:0 0 auto;letter-spacing:.06em;
    text-align:center;
  }
  .foot span{color:#cbc6b8}
  @media (max-width:380px){
    .title{font-size:21px}.score__val{font-size:22px}
  }
</style>
</head>
<body>
  <main class="page" id="page">
    <header class="head">
      <div class="head__title">
        <p class="eyebrow">つくる手帖</p>
        <h1 class="title">ピンボール <small>—— アイデアを、かたちに</small></h1>
      </div>
      <div class="score">

  };
  const masImg = {};
  for(const k in MASC){ const im=new Image(); im.src=MASC[k]; masImg[k]=im; }

  // フリッパー
  function makeFlipper(px,py,rest,up,side){
    return {px,py,len:72,fr:7,rest,up,side,angle:rest,target:rest,omega:0,active:false};
  }
  const flipL = makeFlipper(135,608, 0.45, 0.45-0.62, 'L');
  const flipR = makeFlipper(285,608, Math.PI-0.45, Math.PI-0.45+0.62, 'R');
  const FLIP_SPEED = 18; // rad/s

  // ====== 状態 ======
  let score=0, hi=0, ballsLeft=3, steps=[false,false,false], completes=0;
  let mode='ready'; // ready | play | over
  const ball={x:388,y:640,vx:0,vy:0,inLane:true,launched:false};
  let charge=0, charging=false;

  try{ const s=localStorage.getItem('tt_pinball_hi'); if(s) hi=parseInt(s,10)||0; }catch(e){}

  // ====== DOM ======
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const elScore=document.getElementById('score'), elHi=document.getElementById('hi');
  const elBalls=document.getElementById('balls');
  const chips=[document.getElementById('ch0'),document.getElementById('ch1'),document.getElementById('ch2')];
  const overlay=document.getElementById('overlay'), ovTitle=document.getElementById('ovTitle'),
        ovText=document.getElementById('ovText'), ovBtn=document.getElementById('ovBtn');
  const hanko=document.getElementById('hanko'), launchBtn=document.getElementById('launchBtn');
  elHi.textContent=hi;

  // 解像度（Retina対応）＋ 画面に収める
  const board=document.getElementById('board'), stageEl=document.getElementById('stage');
  function fitBoard(){
    const s=stageEl.getBoundingClientRect();
    if(s.width<2||s.height<2) return;
    const ratio=W/H;
    let w=s.width, h=w/ratio;
    if(h>s.height){ h=s.height; w=h*ratio; }
    board.style.width=Math.floor(w)+'px';
    board.style.height=Math.floor(h)+'px';
  }
  function fitDPR(){
    fitBoard();
    const dpr=Math.min(window.devicePixelRatio||1,2.5);
    cv.width=W*dpr; cv.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  fitDPR();
  addEventListener('resize',fitDPR);
  addEventListener('orientationchange',()=>setTimeout(fitDPR,200));

  // ====== ベクトル小道具 ======
  const sub=(p,q)=>({x:p.x-q.x,y:p.y-q.y});
  const dot=(p,q)=>p.x*q.x+p.y*q.y;
  const len=p=>Math.hypot(p.x,p.y);
  function closestOnSeg(p,a,b){
    const ab={x:b.x-a.x,y:b.y-a.y};
    const t=Math.max(0,Math.min(1, dot(sub(p,a),ab)/(dot(ab,ab)||1)));
    return {x:a.x+ab.x*t,y:a.y+ab.y*t};
  }

  // ====== 物理 ======
  const G=1350;            // 重力
  const MAXV=1850;         // 速度上限
  function step(dt){
    // フリッパー角度更新
    for(const f of [flipL,flipR]){
      f.target = f.active ? f.up : f.rest;
      const prev=f.angle, diff=f.target-f.angle;
      const mx=FLIP_SPEED*dt;
      f.angle += Math.abs(diff)<=mx ? diff : Math.sign(diff)*mx;
      f.omega = (f.angle-prev)/dt;
    }
    if(mode!=='play' && !(mode==='ready'&&ball.launched)) { /* 玉静止中もフリッパーは動かす */ }

    if(!ball.launched){ // レーンで待機 / チャージ
      if(charging){ charge=Math.min(1,charge+dt*1.4); }
      return;
    }

    // 重力＋移動（サブステップ）
    ball.vy += G*dt;
    // 速度上限
    const sp=Math.hypot(ball.vx,ball.vy);
    if(sp>MAXV){ ball.vx*=MAXV/sp; ball.vy*=MAXV/sp; }
    ball.x += ball.vx*dt; ball.y += ball.vy*dt;

    // レーンから盤面へ入ったら通常扱い
    if(ball.inLane && ball.x<372 && ball.y<160){ ball.inLane=false; }
    // 発射レーンの下まで玉が戻ってきたら（弱い発射や盤面から迷い込んだ場合）、もう一度撃てるよう再装填
    if(ball.launched && ball.x>368 && ball.y>610 && ball.vy>-10){
      ball.launched=false; ball.inLane=true; ball.vx=0; ball.vy=0;
      ball.x=388; ball.y=640; charge=0; launchBtn.disabled=false;
    }

    collide();

    // ドレイン
    if(ball.y>H+20 || ball.y>675){ loseBall(); }
  }

  function collide(){
    // 壁
    for(const w of walls){
      const c=closestOnSeg(ball,w.a,w.b);
      const d=sub(ball,c); const dist=len(d);
      if(dist < R){
        let n = dist>0.0001 ? {x:d.x/dist,y:d.y/dist} : {x:0,y:-1};
        // めり込み解消
        const pen=R-dist;
        ball.x+=n.x*pen; ball.y+=n.y*pen;
        const vn=dot(ball,n)*0 + (ball.vx*n.x+ball.vy*n.y);
        if(vn<0){
          const e=w.e;
          ball.vx -= (1+e)*vn*n.x;
          ball.vy -= (1+e)*vn*n.y;
        }
        if(w.kick){
          ball.vx += n.x*w.kick; ball.vy += n.y*w.kick;
          addScore(w.kind==='sling'?60:0);
        }
      }
    }
    // バンパー
    for(const bm of bumpers){
      const d=sub(ball,bm); const dist=len(d);
      const rr=bm.r+R;
      if(dist<rr){
        let n = dist>0.0001 ? {x:d.x/dist,y:d.y/dist} : {x:0,y:-1};
        const pen=rr-dist; ball.x+=n.x*pen; ball.y+=n.y*pen;
        const vn=ball.vx*n.x+ball.vy*n.y;
        if(vn<0){ ball.vx-=1.5*vn*n.x; ball.vy-=1.5*vn*n.y; }
        ball.vx+=n.x*340; ball.vy+=n.y*340; // キック
        bm.flash=1;
        addScore(100);
        if(!steps[bm.idx]){ steps[bm.idx]=true; chips[bm.idx].classList.add('on'); checkComplete(); }
      }
    }
    // フリッパー
    for(const f of [flipL,flipR]){
      const tip={x:f.px+f.len*Math.cos(f.angle), y:f.py+f.len*Math.sin(f.angle)};
      const c=closestOnSeg(ball,{x:f.px,y:f.py},tip);
      const d=sub(ball,c); const dist=len(d); const rr=R+f.fr;
      if(dist<rr){
        let n = dist>0.0001 ? {x:d.x/dist,y:d.y/dist} : {x:0,y:-1};
        const pen=rr-dist; ball.x+=n.x*pen; ball.y+=n.y*pen;
        // 接触点の表面速度（ω × r）
        const r={x:c.x-f.px,y:c.y-f.py};
        const surf={x:-f.omega*r.y, y:f.omega*r.x};
        const rel={x:ball.vx-surf.x, y:ball.vy-surf.y};
        const vn=rel.x*n.x+rel.y*n.y;
        if(vn<0){
          const e=0.25;
          ball.vx -= (1+e)*vn*n.x;
          ball.vy -= (1+e)*vn*n.y;
        }
      }
    }
  }

  function addScore(p){ if(p){ score+=p; elScore.textContent=score; } }

  function checkComplete(){
    if(steps[0]&&steps[1]&&steps[2]){
      completes++; addScore(1000);
      steps=[false,false,false];
      setTimeout(()=>chips.forEach(c=>c.classList.remove('on')), 350);
      popHanko();
    }
  }
  function popHanko(){
    if(reduceMotion){ return; }
    hanko.classList.remove('pop'); void hanko.offsetWidth; hanko.classList.add('pop');
  }

  function loseBall(){
    ballsLeft--;
    updateBalls();
    if(ballsLeft<=0){ gameOver(); }
    else { resetBallToLane(); }
  }
  function resetBallToLane(){
    ball.x=388; ball.y=640; ball.vx=0; ball.vy=0;
    ball.inLane=true; ball.launched=false; charge=0; charging=false;
    launchBtn.disabled=false;
  }
  function updateBalls(){
    elBalls.textContent = '● '.repeat(Math.max(0,ballsLeft)).trim() || '—';
  }

  function gameOver(){
    mode='over';
    if(score>hi){ hi=score; elHi.textContent=hi; try{localStorage.setItem('tt_pinball_hi',String(hi));}catch(e){} }
    ovTitle.textContent='おしまい';
    ovText.innerHTML='得点 <b>'+score+'</b> ／ 完成 <b>'+completes+'</b> 個<br><br>'+
      (score>=hi?'自己ベスト更新です。':'最高 '+hi+'。もう一度どうぞ。');
    ovBtn.textContent='もう一度';
    overlay.style.display='grid';
    launchBtn.disabled=true;
  }

  function startGame(){
    score=0; ballsLeft=3; steps=[false,false,false]; completes=0;
    elScore.textContent='0'; updateBalls();
    chips.forEach(c=>c.classList.remove('on'));
    resetBallToLane();
    mode='play';
    overlay.style.display='none';
  }

  // ====== 描画 ======
  function inkLine(a,b,wdt=3,col='#1f3a5f'){
    ctx.strokeStyle=col; ctx.lineWidth=wdt; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  function drawGrid(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fcfbf7'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#d7e2df'; ctx.lineWidth=1;
    ctx.beginPath();
    for(let x=0;x<=W;x+=22){ ctx.moveTo(x+0.5,0); ctx.lineTo(x+0.5,H); }
    for(let y=0;y<=H;y+=22){ ctx.moveTo(0,y+0.5); ctx.lineTo(W,y+0.5); }
    ctx.stroke();
  }

  function draw(){
    drawGrid();

    // 発射レーンの薄い帯
    ctx.fillStyle='rgba(91,123,122,.06)';
    ctx.fillRect(372,120,32,548);

    // 壁
    for(const w of walls){
      inkLine(w.a,w.b, w.kind==='sling'?4:3, w.kind==='sling'?'#5b7b7a':'#1f3a5f');
    }

    // バンパー（マスコット）
    for(const bm of bumpers){
      const lit = steps[bm.idx];
      // インクの台座（パック）
      ctx.beginPath(); ctx.arc(bm.x,bm.y,bm.r,0,Math.PI*2);
      ctx.fillStyle = lit ? 'rgba(232,101,74,.16)' : 'rgba(252,251,247,.85)'; ctx.fill();
      if(bm.flash>0){ ctx.fillStyle='rgba(232,101,74,'+(0.5*bm.flash)+')'; ctx.fill(); bm.flash=Math.max(0,bm.flash-0.08); }
      ctx.lineWidth=2.5; ctx.strokeStyle= lit ? '#c8472f' : '#e8654a'; ctx.stroke();
      // マスコット本体
      const img = masImg[bm.key];
      if(img && img.complete && img.naturalWidth){
        const D = bm.r*2.7;
        ctx.drawImage(img, bm.x-D/2, bm.y-D/2-2, D, D);
      } else {
        ctx.fillStyle='#1f3a5f'; ctx.font='700 20px "Hiragino Maru Gothic ProN","Yu Gothic",sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(bm.label,bm.x,bm.y+1);
      }
      // 下に小さく漢字
      ctx.fillStyle = lit ? '#c8472f' : 'rgba(31,58,95,.55)';
      ctx.font='700 12px "Hiragino Maru Gothic ProN","Yu Gothic",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(bm.label, bm.x, bm.y+bm.r+10);
      if(lit){ // 朱のチェック
        ctx.strokeStyle='#c8472f'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(bm.x+8,bm.y-bm.r-1); ctx.lineTo(bm.x+13,bm.y-bm.r+4); ctx.lineTo(bm.x+22,bm.y-bm.r-7); ctx.stroke();
      }
    }

    // フリッパー
    for(const f of [flipL,flipR]){
      const tip={x:f.px+f.len*Math.cos(f.angle), y:f.py+f.len*Math.sin(f.angle)};
      inkLine({x:f.px,y:f.py},tip, f.fr*2, '#1f3a5f');
      ctx.beginPath(); ctx.arc(f.px,f.py,f.fr+1,0,Math.PI*2); ctx.fillStyle='#1f3a5f'; ctx.fill();
      ctx.beginPath(); ctx.arc(f.px,f.py,3,0,Math.PI*2); ctx.fillStyle='#fcfbf7'; ctx.fill();
    }

    // 発射のチャージ表示
    if(!ball.launched){
      const h=charge*60;
      ctx.fillStyle='#e8654a';
      ctx.fillRect(396,660-h,4,h);
      ctx.strokeStyle='#9aa3a0'; ctx.lineWidth=1; ctx.strokeRect(395,600,6,60);
    }

    // ボール（アイデア）
    ctx.beginPath(); ctx.arc(ball.x,ball.y,R,0,Math.PI*2);
    ctx.fillStyle='#1f3a5f'; ctx.fill();
    ctx.beginPath(); ctx.arc(ball.x-3,ball.y-3,3.4,0,Math.PI*2);
    ctx.fillStyle='rgba(252,251,247,.85)'; ctx.fill();
    // ひらめきの線
    ctx.strokeStyle='rgba(232,101,74,.8)'; ctx.lineWidth=1.4;
    for(let i=0;i<3;i++){ const a=-Math.PI/2 + (i-1)*0.7;
      ctx.beginPath(); ctx.moveTo(ball.x+Math.cos(a)*(R+2),ball.y+Math.sin(a)*(R+2));
      ctx.lineTo(ball.x+Math.cos(a)*(R+6),ball.y+Math.sin(a)*(R+6)); ctx.stroke(); }

    // ドレインの破線
    ctx.strokeStyle='rgba(154,163,160,.7)'; ctx.lineWidth=1.5; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(150,672); ctx.lineTo(270,672); ctx.stroke(); ctx.setLineDash([]);
  }

  // ====== ループ ======
  let last=performance.now();
  function loop(now){
    let dt=(now-last)/1000; last=now;
    if(dt>0.05) dt=0.05;               // タブ復帰などのスパイク抑制
    const sub=6;                        // サブステップ
    for(let i=0;i<sub;i++){ step(dt/sub); }
    // バンパー flash の自然減衰は draw 内で
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ====== 入力 ======
  function setFlip(side,on){
    if(mode!=='play') {/* readyでも触れるように */}
    if(side==='L') flipL.active=on; else flipR.active=on;
  }
  // キーボード
  const down={};
  addEventListener('keydown',e=>{
    if(e.repeat) return;
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){ setFlip('L',true); }
    else if(e.key==='ArrowRight'||e.key==='l'||e.key==='L'||e.key==='/'){ setFlip('R',true); }
    else if(e.key===' '||e.key==='ArrowDown'){ e.preventDefault(); beginCharge(); }
    else if(e.key==='Enter'){ if(mode!=='play') startGame(); }
  });
  addEventListener('keyup',e=>{
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){ setFlip('L',false); }
    else if(e.key==='ArrowRight'||e.key==='l'||e.key==='L'||e.key==='/'){ setFlip('R',false); }
    else if(e.key===' '||e.key==='ArrowDown'){ releaseCharge(); }
  });

  // タッチ／ポインタ（盤面を左右に分割）
  const stage=document.getElementById('stage');
  const pointerSide={};
  stage.addEventListener('pointerdown',e=>{
    if(mode!=='play') return;
    stage.setPointerCapture(e.pointerId);
    if(!ball.launched){ beginCharge(); pointerSide[e.pointerId]='charge'; return; }
    const rect=stage.getBoundingClientRect();
    const side = (e.clientX-rect.left) < rect.width/2 ? 'L':'R';
    pointerSide[e.pointerId]=side; setFlip(side,true);
  });
  function endPointer(e){
    const s=pointerSide[e.pointerId];
    if(s==='charge') releaseCharge();
    else if(s) setFlip(s,false);
    delete pointerSide[e.pointerId];
  }
  stage.addEventListener('pointerup',endPointer);
  stage.addEventListener('pointercancel',endPointer);

  // 発射ボタン
  launchBtn.addEventListener('pointerdown',e=>{ e.preventDefault(); if(mode==='play') beginCharge(); });
  launchBtn.addEventListener('pointerup',e=>{ e.preventDefault(); releaseCharge(); });
  launchBtn.addEventListener('pointercancel',()=>releaseCharge());

  function beginCharge(){ if(mode==='play' && !ball.launched){ charging=true; } }
  function releaseCharge(){
    if(mode==='play' && !ball.launched && (charging||charge>0)){
      charging=false;
      const power = 1250 + charge*450;
      ball.vy = -power; ball.launched=true; launchBtn.disabled=true;
      charge=0;
    } else { charging=false; }
  }

  ovBtn.addEventListener('click',startGame);

  // 初期描画
  updateBalls(); draw();
  window.addEventListener('resize',()=>{ fitDPR(); });

  // iOS Safari は拡大禁止指定を無視するので、ジェスチャ拡大を抑止して固定表示を保つ
  document.addEventListener('gesturestart', e=>e.preventDefault());
  document.addEventListener('gesturechange', e=>e.preventDefault());
  document.addEventListener('dblclick', e=>e.preventDefault());
})();
</script>
<script>
if('serviceWorker' in navigator){
  addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
